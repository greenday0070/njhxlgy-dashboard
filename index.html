const { db, ref, set: fbSet, onValue } = window.fb;

function useShared(path, defaultValue) {
  const [val, setVal] = useState(defaultValue);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    const r = ref(db, "shared/" + path);
    const unsub = onValue(r, (snap) => {
      const v = snap.val();
      setVal(v === null || v === undefined ? defaultValue : v);
      setReady(true);
    });
    return () => unsub();
  }, []);
  const save = useCallback((newVal) => {
    setVal(newVal);
    fbSet(ref(db, "shared/" + path), newVal === undefined ? null : newVal).catch(()=>{});
  }, [path]);
  return [val, save, ready];
}

  useEffect(() => { setMemosLocal(memos); }, [memos]);
  useEffect(() => { setDirectionLocal(direction); }, [direction]);
  useEffect(() => {
    if (!r2) return;
    if (JSON.stringify(memosLocal) === JSON.stringify(memos)) return;
    const t = setTimeout(() => setMemos(memosLocal), 500);
    return () => clearTimeout(t);
  }, [memosLocal]);
  useEffect(() => {
    if (!r3) return;
    if (directionLocal === direction) return;
    const t = setTimeout(() => setDirection(directionLocal), 600);
    return () => clearTimeout(t);
  }, [directionLocal]);

  const allTrips = useMemo(() => {
    const map = {};
    const base = Array.isArray(baseTrips) ? baseTrips : [];
    const custom = Array.isArray(customTrips) ? customTrips : [];
    [...base, ...custom].forEach((t) => { if (t && t.date) map[t.date] = t; });
    return map;
  }, [baseTrips, customTrips]);

  const toggle = (id) => {
    const n = { ...(checks || {}) };
    if (n[id]) delete n[id]; else n[id] = true;
    setChecks(n);
  };

  const weekDays = useMemo(() => Array.from({length:7}, (_,i) => addDays(weekStart, i)), [weekStart]);
  const todayISO = iso(today);
  const isThisWeek = iso(weekStart) === iso(mondayOf(today));
  const loaded = r1 && r2 && r3 && r4 && r5;

  if (!loaded) {
    return <div className="flex items-center justify-center h-64 text-slate-400 text-sm">불러오는 중…</div>;
  }

  return (
    <div className="min-h-screen text-slate-800">
      <div className="max-w-3xl mx-auto px-4 pb-16">
        <header className="pt-6 pb-3">
          <div className="flex items-center gap-2 text-emerald-700">
            <Icon n="sprout" size={22} />
            <h1 className="text-lg font-bold tracking-tight">NJHXLGY 농업연구 작업 대시보드</h1>
          </div>
          <p className="text-xs text-slate-500 mt-1">현재 우리 과제 · 온실 운영 현황</p>
        </header>

        <nav className="flex gap-1 overflow-x-auto pb-2 -mx-1 px-1 sticky top-0 bg-gradient-to-b from-emerald-50/95 to-emerald-50/80 backdrop-blur z-10">
          {[["today","오늘","sun"],["week","이번 주","clipboard"],["houses","온실별","leaf"],["routine","루틴","clipboard"],["check","체크리스트","cc"],["goal","과제 방향","target"]].map(([k,label,ic]) => (
            <button key={k} onClick={() => setTab(k)}
              className={`flex items-center gap-1.5 whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-medium transition ${tab===k?"bg-emerald-600 text-white shadow-sm":"bg-white text-slate-600 border border-slate-200 hover:border-emerald-300"}`}>
              <Icon n={ic} size={13} /> {label}
            </button>
          ))}
        </nav>

        <div className="mt-4">
          {tab === "today" && <TodayView {...{today, todayISO, allTrips, checks, toggle, memos: memosLocal, setMemos: setMemosLocal}} />}
          {tab === "week" && <WeekView {...{weekDays, weekStart, setWeekStart, today, allTrips, checks, toggle, isThisWeek, customTrips, setCustomTrips}} />}
          {tab === "houses" && <HousesView />}
          {tab === "routine" && <RoutineView />}
          {tab === "check" && <ChecklistView />}
          {tab === "goal" && <GoalView {...{direction: directionLocal, setDirection: setDirectionLocal}} />}
        </div>

        <footer className="mt-10 text-center text-[11px] text-slate-400">
          체크 · 메모는 Firebase로 자동 저장되며, 이 대시보드 링크를 가진 모든 사람이 같은 내용을 실시간으로 함께 봅니다.
        </footer>
      </div>
    </div>
  );
}

        <div>
          <b>양액탱크 비우거나 채울 경우</b> — 수위 체크 + 양액분석 의뢰.
          분석의뢰 코드는 <b>'오늘' 탭 하단 생성기</b>를 활용하세요. (예: 260524-진청맛-W1-4-T4)
        </div>
      </div>
    </div>
  );
}

function ChecklistView() {
  const lists = [
    { title: "온실 사용 전 순서", icon: "clipboard",
      items: ["작업일정 공유 (신정유 / 허영주 선생님)", "난방 사용 전 무단 사용 금지 — 미리 공유 후 일정 받아 사용", "포장작업신청서 작성", "물품 재고 파악 / 신청", "온실 기기(양액공급장치 포함) 이상유무 점검 · 청소 · 기본 물품 정리/비치", "온실 환경 정비(CR1000 등) / 센서 설치", "파종 / 배지 포수 / 양액 농축액 제조 (정식 전 양액 공급 시)", "작물 정식 / 농축액 제조", "양액 공급 설정"] },
    { title: "기본 온실 구비 물품", icon: "boxes",
      items: ["필기구류: 네임펜, 볼펜, 라벨링테이프, 수정테이프, 스카치테이프, 칼, 가위", "작업도구: 전정가위, 라텍스장갑(S·M), 건전지(AA), 케이블타이, EC/pH 센서, 센서 교정/검경액, 코니칼튜브 50mL, 렉, 비닐팩, 종이봉투(소·중·대), 페트리디쉬, 사진천(검은색)", "센서류: 온습도 센서, 배지 화학성 모니터링, 양액 모니터링 센서류, 데이터베이스 스테이션", "청소도구: 와이퍼올, 물티슈, 빗자루, 쓰레받기 등", "기록용지: 온도, 작업일지표(+기타 작업사항·애로사항)"] },
    { title: "조사 시 물품 준비", icon: "scissors",
      items: ["필기구류, 작업도구, 종이봉투, 바구니(소·중·대), 쓰레기통", "사진천(검은색), 저울(무게측정), SPAD, 줄자, 믹서기(건조 후)"] },
  ];
  return (
    <div className="space-y-4">
      <div className="rounded-2xl border border-amber-300 bg-amber-50 p-4">
        <h3 className="font-bold text-amber-800 flex items-center gap-1.5 text-sm mb-2"><Icon n="alert" size={15} /> 전달사항</h3>
        <ul className="space-y-1.5 text-sm text-amber-800">
          <li className="flex gap-1.5"><span>•</span> 작물 생육 이상 / 센서 · 온실 이상 시 <b>바로 연락</b>주세요.</li>
          <li className="flex gap-1.5"><span>•</span> 시금치 발아 시작 날짜 체크 — <b>발아 시작 / 50% 출아 / 70~80% 도달</b> 시 발아율까지 기록.</li>
          <li className="flex gap-1.5"><span>•</span> 분무경 청소는 <b>최종 확인 후</b> 진행.</li>
        </ul>
      </div>
      {lists.map((l) => <CheckBlock key={l.title} {...l} />)}
    </div>
  );
}

function CheckBlock({title, icon, items}) {
  const [open, setOpen] = useState(true);
  const [done, setDone] = useState({});
  return (
    <div className="rounded-2xl border border-slate-200 bg-white overflow-hidden">
      <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between px-4 py-3 hover:bg-slate-50">
        <span className="font-semibold text-sm text-slate-700 flex items-center gap-2"><Icon n={icon} size={15} className="text-emerald-600" /> {title}</span>
        <Icon n="chR" size={16} className="text-slate-400 transition" style={{transform: open?"rotate(90deg)":"none"}} />
      </button>
      {open && (
        <ul className="px-4 pb-3 space-y-1.5">
          {items.map((it, i) => (
            <li key={i}>
              <button onClick={() => setDone((d) => ({...d, [i]: !d[i]}))} className="w-full flex items-start gap-2 text-left group">
                {done[i] ? <Icon n="cc" size={16} className="text-emerald-600 mt-0.5 shrink-0" /> : <Icon n="circle" size={16} className="text-slate-300 group-hover:text-emerald-400 mt-0.5 shrink-0" />}
                <span className={`text-sm ${done[i]?"line-through text-slate-400":"text-slate-700"}`}>{it}</span>
              </button>
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

function GoalView({direction, setDirection}) {
  const [edit, setEdit] = useState(false);
  return (
    <div className="rounded-2xl border border-emerald-200 bg-white p-4">
      <div className="flex items-center justify-between mb-3">
        <h2 className="font-bold text-emerald-700 flex items-center gap-1.5 text-sm"><Icon n="target" size={16} /> 과제 방향성</h2>
        <button onClick={() => setEdit(!edit)} className="text-xs px-2.5 py-1 rounded-lg bg-emerald-50 text-emerald-700 font-medium">{edit?"완료":"수정"}</button>
      </div>
      {edit ? (
        <textarea value={direction || ""} onChange={(e) => setDirection(e.target.value)} rows={16} className="w-full text-sm border border-emerald-200 rounded-lg p-3 leading-relaxed focus:outline-none focus:ring-1 focus:ring-emerald-400" />
      ) : (
        <pre className="text-sm text-slate-700 whitespace-pre-wrap font-sans leading-relaxed">{direction}</pre>
      )}
      <p className="text-[11px] text-slate-400 mt-2">수정 내용은 자동 저장됩니다. 연구원과 공유할 과제 맥락을 자유롭게 적어두세요.</p>
    </div>
  );
}

function NutrientCodeTool() {
  const todayYMD = useMemo(() => {
    const d = new Date();
    return `${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  }, []);
  const [ymd, setYmd] = useState(todayYMD);
  const [variety, setVariety] = useState("");
  const [house, setHouse] = useState("W1-4");
  const [treat, setTreat] = useState("");
  const [analysis, setAnalysis] = useState("nutrient");
  const [leaf, setLeaf] = useState("UL");
  const [copied, setCopied] = useState(false);

  const parts = [ymd, variety||"품종", house, treat||"T1"];
  if (analysis === "plant") parts.push(leaf);
  const code = parts.join("-");

  const copy = () => {
    try {
      const ta = document.createElement("textarea");
      ta.value = code; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(() => setCopied(false), 1500);
    } catch (e) {}
  };

  return (
    <div className="rounded-2xl border border-slate-200 bg-white p-4">
      <h3 className="text-sm font-bold text-slate-700 flex items-center gap-1.5 mb-1"><Icon n="flask" size={15} className="text-rose-500" /> 분석 의뢰 코드 생성</h3>
      <p className="text-[11px] text-slate-400 mb-3">
        양액분석 예: 260524-진청맛-W1-4-T4<br />
        식물체분석 예: 260524-진청맛-W1-4-T4-UL (상부엽) / -LL (하엽)
      </p>

      <div className="mb-3">
        <span className="text-[11px] text-slate-500 block mb-1">분석 종류</span>
        <div className="grid grid-cols-2 gap-2">
          {[["nutrient","양액분석","droplets"],["plant","식물체분석","leaf"]].map(([v,label,ic]) => (
            <button key={v} onClick={() => setAnalysis(v)}
              className={`flex items-center justify-center gap-1.5 text-xs font-medium py-2 rounded-lg border transition ${analysis===v?"bg-rose-500 text-white border-rose-500":"bg-white text-slate-600 border-slate-200 hover:border-rose-300"}`}>
              <Icon n={ic} size={13} /> {label}
            </button>
          ))}
        </div>
      </div>

      {analysis === "plant" && (
        <div className="mb-3">
          <span className="text-[11px] text-slate-500 block mb-1">잎 부위</span>
          <div className="grid grid-cols-2 gap-2">
            {[["UL","상부엽 (UL)"],["LL","하엽 (LL)"]].map(([v,label]) => (
              <button key={v} onClick={() => setLeaf(v)}
                className={`text-xs font-medium py-2 rounded-lg border transition ${leaf===v?"bg-violet-500 text-white border-violet-500":"bg-white text-slate-600 border-slate-200 hover:border-violet-300"}`}>
                {label}
              </button>
            ))}
          </div>
        </div>
      )}

      <div className="grid grid-cols-2 gap-2">
        <Field label="날짜(yymmdd)"><input value={ymd} onChange={(e) => setYmd(e.target.value)} className="inp" /></Field>
        <Field label="품종명"><input value={variety} onChange={(e) => setVariety(e.target.value)} placeholder="진청맛" className="inp" /></Field>
        <Field label="온실">
          <select value={house} onChange={(e) => setHouse(e.target.value)} className="inp">
            {["W1-4","W1-5","W1-2","E11-1","E4-6"].map((o) => <option key={o}>{o}</option>)}
          </select>
        </Field>
        <Field label="처리명"><input value={treat} onChange={(e) => setTreat(e.target.value)} placeholder="T4" className="inp" /></Field>
      </div>
      <div className="mt-3 flex items-center gap-2">
        <code className="flex-1 text-sm bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 font-mono text-slate-700">{code}</code>
        <button onClick={copy} className="px-3 py-2 rounded-lg bg-emerald-600 text-white text-xs font-medium flex items-center gap-1">
          {copied ? <><Icon n="check" size={13} /> 복사됨</> : <><Icon n="copy" size={13} /> 복사</>}
        </button>
      </div>
    </div>
  );
}
function Field({label, children}) {
  return (
    <label className="block">
      <span className="text-[11px] text-slate-500 block mb-1">{label}</span>
      {children}
    </label>
  );
}

function mount() {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}
if (window.fb) mount();
else window.addEventListener("firebase-ready", mount);
</script>

</body>
</html>
